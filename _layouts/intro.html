<!DOCTYPE html>


<html lang="en">

<head>
    <link rel="stylesheet" href="/css/extra.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.5.4/dist/css/uikit.min.css" />

    <!-- UIkit JS -->
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.5.4/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.5.4/dist/js/uikit-icons.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="/js/granim.min.js"></script>
    <script src="/js/tilt.jquery.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Neal Chokshi</title>

</head>

<body style="background-color:#242424">
    <canvas class="background"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particlesjs/2.2.2/particles.min.js"></script>
    <script src="../js/main.js"></script>
    <div class="center-screen uk-animation-fade">
        <div class="js-tilt" data-tilt-perspective="300" data-tilt-speed="400" data-tilt-max="35" >
            <div class="parent" style="border-radius: 100%;">
                <canvas id="canvas-basic"></canvas>
                <div class="child">
                    <img src="../imgs/neal.png" id="profile-pic" />
                </div>

            </div>
        </div>
        <h1 class="uk-heading-small " style="color: white; margin-bottom: -10px;">Neal Chokshi</h1>
        <nav class="uk-navbar-container uk-navbar-transparent" uk-navbar>
            <div class="uk-navbar-left">
                <ul class="uk-navbar-nav">
                    <li><a class="l-inactive" href="/blog">Blog</a></li>
                    <li><a class="l-inactive" href="">Resume</a></li>
                    <li><a class="l-inactive" href="/about">About</a></li>
                </ul>
            </div>
        </nav>
        <ul class="uk-iconnav uk-navbar-transparent">
            <li><a href="https://github.com/nealpointerexception" uk-icon="icon: github"></a></li>
            <li><a href="" uk-icon="icon: linkedin"></a></li>
        </ul>
    </div>

    <!-- Create a Granim instance -->
    <script>
        var granimInstance = new Granim({
            element: '#canvas-basic',
            name: 'granim',
            opacity: [1, 1],
            states: {
                "default-state": {
                    gradients: [
                        ['#0215fd', '#ff0900'],
                        ['#ee00ff', '#5b33f6'],
                    ]
                }
            }
        });
    </script>

</body>

</html>
